# Static Site no Render — saída Vite em /build (compatível com preset “build” do Render).
services:
  - type: web
    name: treino-app
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
